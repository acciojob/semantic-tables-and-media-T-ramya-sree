<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Media Table and List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    table {
      border-collapse: collapse;
      width: 400px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }

    thead {
      background-color: #f2f2f2;
    }

    h2 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- SEMANTIC TABLE -->
  <table>

    <thead>
      <tr>
        <th>Roll Number</th>
        <th>Name</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>1</td>
        <td>Aman</td>
      </tr>

      <tr>
        <td>2</td>
        <td>Riya</td>
      </tr>

      <tr>
        <td>3</td>
        <td>John</td>
      </tr>
    </tbody>

  </table>

  <!-- HEADING -->
  <h2>List of medias</h2>

  <!-- ORDERED LIST -->
  <ol>

    <!-- Image -->
    <li>
      <img src="https://picsum.photos/id/123/200/300" alt="Random Image">
    </li>

    <!-- Video -->
    <li>
      <video width="320" height="240" controls>
        <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
      </video>
    </li>

    <!-- Audio -->
    <li>
      <audio controls>
        <source src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" type="audio/ogg">
      </audio>
    </li>

  </ol>

</body>

</html>
