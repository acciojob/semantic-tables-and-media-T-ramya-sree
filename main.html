<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Semantic Tables and Media</title>
</head>

<body>

    <!-- ================= TABLE ================= -->
    <table border="1">
        <thead>
            <tr>
                <th>Roll Number</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Ritesh</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Suresh</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Mahesh</td>
            </tr>
        </tbody>
    </table>

    <!-- ================= HEADING ================= -->
    <h2>List of medias</h2>

    <!-- ================= ORDERED LIST ================= -->
    <ol>

        <!-- Image -->
        <li>
            <img src="https://picsum.photos/id/123/200/300" alt="Sample Image">
        </li>

        <!-- Video -->
        <li>
            <video controls>
                <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                    type="video/mp4">
            </video>
        </li>

        <!-- Audio (FIXED) -->
        <li>
            <audio controls src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg">
                Your browser does not support the audio element.
            </audio>
        </li>

    </ol>

</body>

</html>
