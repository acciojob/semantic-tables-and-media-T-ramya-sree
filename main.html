<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Media Table and List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    table {
      border-collapse: collapse;
      width: 400px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }

    thead {
      background-color: #f2f2f2;
    }

    h2 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- TABLE -->
  <table>

    <thead>
      <tr>
        <th>Roll Number</th>
        <th>Name</th>
      </tr>
    </thead>

    <tbody>
      <tr><td>1</td><td>Aman</td></tr>
      <tr><td>2</td><td>Riya</td></tr>
      <tr><td>3</td><td>John</td></tr>
    </tbody>

  </table>

  <!-- HEADING -->
  <h2>List of medias</h2>

  <!-- LIST -->
  <ol>

    <!-- IMAGE -->
    <li>
      <img src="https://picsum.photos/id/123/200/300" alt="Random Image">
    </li>

    <!-- VIDEO -->
    <li>
      <video src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" controls></video>
    </li>

    <!-- AUDIO (FIXED) -->
    <li>
      <audio src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" controls></audio>
    </li>

  </ol>

</body>

</html>
